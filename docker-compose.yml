# Docker Compose for local development with multiple server instances
# Services: nginx (load balancer), server-1, server-2, client, mongodb, redis

version: "3.9"

networks:
  chat-network:
    driver: bridge

volumes:
  mongo-data:

services:
  # ── Load balancer ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server-1
      - server-2
      - client
    networks:
      - chat-network
    restart: unless-stopped

  # ── Backend instance 1 ───────────────────────────────────────────────────────
  server-1:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5001:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - INSTANCE_ID=server-1
      - MONGODB_URI=mongodb://mongodb:27017/realtime-chat
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-changeme_in_production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-changeme_in_production}
      - CLIENT_URL=http://localhost
    depends_on:
      - mongodb
      - redis
    networks:
      - chat-network
    restart: unless-stopped

  # ── Backend instance 2 ───────────────────────────────────────────────────────
  server-2:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5002:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - INSTANCE_ID=server-2
      - MONGODB_URI=mongodb://mongodb:27017/realtime-chat
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-changeme_in_production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-changeme_in_production}
      - CLIENT_URL=http://localhost
    depends_on:
      - mongodb
      - redis
    networks:
      - chat-network
    restart: unless-stopped

  # ── React dev server ─────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost/api
      - REACT_APP_SOCKET_URL=http://localhost
      - CHOKIDAR_USEPOLLING=true
    networks:
      - chat-network
    restart: unless-stopped

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - chat-network
    restart: unless-stopped
    command: mongod --quiet

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - chat-network
    restart: unless-stopped
    command: redis-server --loglevel warning
