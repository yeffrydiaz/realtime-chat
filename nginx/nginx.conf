worker_processes auto;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── Upstream backend (ip_hash required for Socket.io sticky sessions) ───────
    upstream backend {
        ip_hash;
        server server-1:5000;
        server server-2:5000;
    }

    # ── Main server block ────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Increase buffer sizes for large WebSocket frames / file uploads
        client_max_body_size 25M;
        proxy_buffer_size   128k;
        proxy_buffers       4 256k;
        proxy_busy_buffers_size 256k;

        # ── REST API ───────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── Socket.io (WebSocket + long-polling) ───────────────────────────────
        location /socket.io/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Keep WebSocket connections alive
            proxy_connect_timeout  60s;
            proxy_send_timeout    3600s;
            proxy_read_timeout    3600s;
        }

        # ── React dev server (everything else) ────────────────────────────────
        location / {
            proxy_pass         http://client:3000;
            proxy_http_version 1.1;

            # Support Create React App's WebSocket-based hot reload
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
